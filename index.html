      // Global protection for TikTok embed scripts to prevent undefined length errors

          } catch (e) {
            console.warn("TikTok embed: slice error caught:", e);
            return [];
          }
        };

        // Protect common operations that might be performed on undefined collections
        window.addEventListener("DOMContentLoaded", function () {
          // Override NodeList and HTMLCollection prototypes if they exist
          if (typeof NodeList !== "undefined" && NodeList.prototype) {
            const originalForEach = NodeList.prototype.forEach;
            if (originalForEach) {
              NodeList.prototype.forEach = function (callback, thisArg) {
                try {
                  if (!this || typeof this.length !== "number") {
                    console.warn(
                      "TikTok embed: forEach called on invalid NodeList",
                    );
                    return;
                  }
                  return originalForEach.call(this, callback, thisArg);
                } catch (e) {
                  console.warn(
                    "TikTok embed: NodeList.forEach error caught:",
                    e,
                  );
                }
              };
            }
          }

          // Additional protection for HTMLCollection
          if (
            typeof HTMLCollection !== "undefined" &&
            HTMLCollection.prototype
          ) {
            // HTMLCollection doesn't have forEach by default, but some polyfills might add it
            if (HTMLCollection.prototype.forEach) {

                    );
                    return;
                  }
                  return originalHTMLForEach.call(this, callback, thisArg);
                } catch (e) {
                  console.warn(
                    "TikTok embed: HTMLCollection.forEach error caught:",
                    e,
                  );
                }
              };
            }
          }
        });
      })();
